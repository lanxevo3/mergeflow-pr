<!DOCTYPE html><html lang=en><head><meta charset=UTF-8><title>MergeFlow Admin</title><style>
*{box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;margin:0;padding:20px;font-size:14px}
h1{margin:0 0 16px;color:#3fb950}h2{color:#e6edf3;font-size:1.1em;margin:20px 0 8px;border-bottom:1px solid #21262d;padding-bottom:6px}
.s{display:flex;gap:20px;margin-bottom:24px}.b{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:14px 20px}
.v{font-size:2em;font-weight:800;color:#3fb950}.l{font-size:10px;color:#6e7681;text-transform:uppercase;margin-top:4px}
table{width:100%;border-collapse:collapse;margin-bottom:24px}th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #21262d}
th{color:#6e7681;font-size:10px;text-transform:uppercase}tr:hover td{background:#161b22}tr{cursor:pointer}
.g{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600}.p{background:rgba(63,185,80,0.2);color:#3fb950}.f{background:rgba(110,118,129,0.2);color:#6e7681}
.x{display:none;padding:10px;background:#0d1117;border:1px solid #21262d;border-radius:6px;margin-top:6px}.r{display:flex;gap:8px;padding:3px 0;border-bottom:1px solid #21262d;font-size:12px;align-items:center}
.r:last-child{border:none}.n{color:#6e7681;min-width:30px}.t{flex:1;color:#c9d1d9}.a{color:#6e7681;min-width:60px}.s2{color:#3fb950;min-width:60px}
.tb{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #21262d}
.bk{background:#21262d;color:#8b949e;padding:6px 14px;border-radius:6px;font-size:13px;text-decoration:none}.bk:hover{color:#c9d1d9}
.al{border:1px solid rgba(63,185,80,0.3);border-radius:8px;padding:16px;margin-top:16px;background:rgba(63,185,80,0.05)}.al h2{color:#3fb950;border:none;margin-bottom:12px}
.i{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px 14px;margin:6px 0}.r2{background:rgba(63,185,80,0.15);color:#3fb950;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;margin-right:8px}
.err{background:#3d1515;border:1px solid #f85149;border-radius:6px;padding:12px;color:#f85149;margin-bottom:16px}
</style></head><body>
<div class=tb><h1>MergeFlow Admin</h1><a href=/dashboard class=bk>Back to App</a></div>
<div class=s><div class=b><div class=v id=tu>-</div><div class=l>Total</div></div><div class=b><div class=v id=pu>-</div><div class=l>Paid</div></div><div class=b><div class=v id=fu>-</div><div class=l>Free</div></div></div>
<div class=al><h2>Repos Needing Attention</h2><div id=aitems></div></div>
<h2>All Users</h2>
<table><thead><tr><th>User</th><th>GitHub</th><th>Plan</th><th>Repos</th><th>Since</th><th>Stripe</th></tr></thead>
<tbody id=tb></tbody></table>
<script>
async function init(){
  var u=window.location.search;
  var k=new URLSearchParams(u).get("key")||"";
  var url="/admin/api"+(k?"?key="+encodeURIComponent(k):"");
  var r=await fetch(url);
  if(!r.ok){document.body.innerHTML="<pre class=err>"+await r.text()+"</pre>";return}
  var d=await r.json();
  document.getElementById("tu").textContent=d.summary.total_users;
  document.getElementById("pu").textContent=d.summary.paid_users;
  document.getElementById("fu").textContent=d.summary.free_users;
  var als=document.getElementById("aitems");
  if(d.alerts&&d.alerts.length>0){
    als.innerHTML=d.alerts.map(function(a){
      return '<div class=i>'+a.prs.map(function(p){
        return '<span class=r2>'+p.repo.split("/")[1]+'</span><a href="'+p.url+'">#'+p.number+' '+(p.title||"").slice(0,50)+'</a>';
      }).join("")+'</div>';
    }).join("");
  } else {
    als.innerHTML='<div class=i style="color:#6e7681">No repos with open PRs needing attention</div>';
  }
  var tb=document.getElementById("tb");
  tb.innerHTML=d.users.map(function(u){
    var bc=u.plan==="paid"?"p":"f";
    var rows=u.repos.map(function(r){
      var ps=r.prs&&r.prs.length?r.prs.map(function(p){
        return '<div class=r><span class=n>#'+p.number+'</span><span class=t>'+(p.title||"").slice(0,55)+'</span><span class=a>'+p.author+'</span><span class=s2>'+(p.draft?"DRAFT":"READY")+'</span></div>';
      }).join(""):'<div class=r style="color:#6e7681;font-size:12px">No open PRs</div>';
      return '<tr onclick="tt(\'x'+r.id+'\')"><td>'+u.email+'</td><td>'+(u.github||"-")+'</td><td><span class="g '+bc+'">'+(u.plan||"free")+'</span></td><td>'+r.full_name+'</td><td>'+(u.created||"-")+'</td><td style="font-size:11px;color:#6e7681">'+(u.stripe_id||"-")+'</td></tr><tr><td colspan=6 style="padding:0"><div class=x id=x'+r.id+'>'+ps+'</div></td></tr>';
    }).join("");
    return rows||'<tr><td colspan=6 style="color:#6e7681">No repos</td></tr>';
  }).join("");
};
function tt(id){var e=document.getElementById(id);if(e)e.style.display=e.style.display==="block"?"none":"block";}
init();
</script></body></html>
